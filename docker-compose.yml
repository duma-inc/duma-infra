services:
  web:
    build: ./web
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mongodb
      - redis
      - rabbitmq
    restart: unless-stopped
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: duma
      POSTGRES_PASSWORD: 163duma
      POSTGRES_DB: duma_db
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped    

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: duma
      MONGO_INITDB_ROOT_PASSWORD: 163duma
      MONGO_INITDB_DATABASE: duma_db
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
  mongo_data:
  