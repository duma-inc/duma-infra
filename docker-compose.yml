services:
  api:
    build: ../duma-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: DOCKER
    depends_on:
      - db
      - mongodb
      - redis
      - rabbitmq
    restart: unless-stopped
  # ava:
  #   build: ../duma-frontend-ava
  #   ports:
  #     - "3001:3001"

  # adm:
  #   build: ../duma-frontend-adm
  #   ports:
  #     - "3002:3002"

  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: duma
      POSTGRES_PASSWORD: 163duma
      POSTGRES_DB: duma_db
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: duma
      MONGO_INITDB_ROOT_PASSWORD: 163duma
      MONGO_INITDB_DATABASE: duma_db
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: duma
      RABBITMQ_DEFAULT_PASS: 163duma
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      #   - ava
      #   - adm
    restart: unless-stopped

volumes:
  db_data:
  mongo_data:
