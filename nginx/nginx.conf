# ==============================================
# NGINX Configuration for DUMA
# ==============================================

# Configuração de upstream para a API
upstream api_backend {
    server api:8080;
}

# Configuração de upstream para AVA (se necessário)
upstream ava_backend {
    server ava:3001;
}

# Configuração de upstream para ADM (se necessário)
upstream adm_backend {
    server adm:3002;
}

# ==============================================
# Servidor HTTP Principal
# ==============================================
server {
    listen 80;
    server_name localhost;
    
    # Charset
    charset utf-8;
    
    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Tamanho máximo do body (para uploads)
    client_max_body_size 100M;
    
    # Timeouts
    proxy_connect_timeout 600;
    proxy_send_timeout 600;
    proxy_read_timeout 600;
    send_timeout 600;
    
    # ==============================================
    # ROTA: API Backend
    # ==============================================
    location /api/ {
        # Remove o /api/ do path antes de enviar para o backend
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket support (se a API usar)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # ==============================================
    # ROTA: API Direta (sem /api/ no path)
    # ==============================================
    # Descomente se quiser que localhost/ acesse a API diretamente
    # location / {
    #     proxy_pass http://api_backend;
    #     proxy_http_version 1.1;
    #     
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    
    # ==============================================
    # ROTA: AVA (Frontend/Serviço)
    # ==============================================
    location /ava/ {
        rewrite ^/ava/(.*) /$1 break;
        
        proxy_pass http://ava_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # ==============================================
    # ROTA: ADM (Admin Panel)
    # ==============================================
    location /adm/ {
        rewrite ^/adm/(.*) /$1 break;
        
        proxy_pass http://adm_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # ==============================================
    # ROTA: Health Check
    # ==============================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # ==============================================
    # ROTA: Status do Nginx
    # ==============================================
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker networks
        deny all;
    }
    
    # ==============================================
    # Arquivos Estáticos (se necessário)
    # ==============================================
    # location /static/ {
    #     alias /var/www/static/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }
    
    # ==============================================
    # Favicon
    # ==============================================
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    
    # ==============================================
    # Robots.txt
    # ==============================================
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
    
    # ==============================================
    # Segurança: Negar acesso a arquivos ocultos
    # ==============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
